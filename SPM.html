<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SPM Tutorial | Diploma PYQs</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-50 font-sans">

    <header class="bg-gradient-to-r from-orange-500 to-red-600 p-6 shadow-lg rounded-b-[2rem]">
        <div class="flex justify-between items-center text-white">
            <div>
                <h1 class="text-2xl font-black tracking-tight">SPM TUTORIAL</h1>
                <p class="text-xs opacity-90">Success Through Excellence</p>
            </div>
            <i class="fa-solid fa-graduation-cap text-3xl"></i>
        </div>
    </header>

    <div class="px-5 -mt-6">
        <div class="bg-white rounded-2xl shadow-xl p-2 flex items-center">
            <i class="fa-solid fa-magnifying-glass text-gray-400 ml-3"></i>
            <input type="text" id="searchInput" onkeyup="searchPapers()" placeholder="Search Subject or Semester..." 
                   class="w-full p-3 rounded-2xl border-none focus:ring-0 text-gray-700">
        </div>
    </div>

    <main class="p-5">
        <div class="flex justify-between items-center mb-4">
            <h2 class="font-bold text-gray-800">Available PYQs</h2>
            <span class="text-xs font-bold text-orange-600 bg-orange-100 px-2 py-1 rounded-full">New Papers Added</span>
        </div>

        <div id="paperList" class="space-y-3">
            <div class="paper-card bg-white p-4 rounded-2xl flex justify-between items-center shadow-sm border border-gray-100">
                <div class="flex items-center">
                    <div class="bg-blue-50 p-3 rounded-xl mr-4">
                        <i class="fa-solid fa-file-pdf text-blue-500 text-xl"></i>
                    </div>
                    <div>
                        <h3 class="font-bold text-gray-800 leading-tight">Basic Mathematics-I</h3>
                        <p class="text-[10px] text-gray-400 font-bold uppercase tracking-wider">Semester 1 • 2024</p>
                    </div>
                </div>
                <a href="papers/math-2024.pdf" class="bg-orange-500 text-white p-3 rounded-xl shadow-md active:scale-90 transition">
                    <i class="fa-solid fa-download"></i>
                </a>
            </div>

            <div class="paper-card bg-white p-4 rounded-2xl flex justify-between items-center shadow-sm border border-gray-100">
                <div class="flex items-center">
                    <div class="bg-green-50 p-3 rounded-xl mr-4">
                        <i class="fa-solid fa-file-pdf text-green-500 text-xl"></i>
                    </div>
                   <div>
                        <h3 class="font-bold text-gray-800 leading-tight">Basic Mathematics-II</h3>
                        <p class="text-[10px] text-gray-400 font-bold uppercase tracking-wider">Semester 2 • 2024</p>
                    </div>
                </div>
                <a href="papers/math-2024.pdf" class="bg-orange-500 text-white p-3 rounded-xl shadow-md active:scale-90 transition">
                    <i class="fa-solid fa-download"></i>
                </a>
            </div>

            <div class="paper-card bg-white p-4 rounded-2xl flex justify-between items-center shadow-sm border border-gray-100">
                <div class="flex items-center">
                    <div class="bg-green-50 p-3 rounded-xl mr-4">
                        <i class="fa-solid fa-file-pdf text-green-500 text-xl"></i>
                    </div>
                   <div>
                        <h3 class="font-bold text-gray-800 leading-tight">Mine Geology-I</h3>
                        <p class="text-[10px] text-gray-400 font-bold uppercase tracking-wider">Semester 3 • 2024</p>
                    </div>
                </div>
                <a href="papers/2025(W) MINE GEOLOGY-I.pdf" class="bg-orange-500 text-white p-3 rounded-xl shadow-md active:scale-90 transition">
                    <i class="fa-solid fa-download"></i>
                </a>
            </div>

            <div class="paper-card bg-white p-4 rounded-2xl flex justify-between items-center shadow-sm border border-gray-100">
                <div class="flex items-center">
                    <div class="bg-green-50 p-3 rounded-xl mr-4">
                        <i class="fa-solid fa-file-pdf text-green-500 text-xl"></i>
                    </div>

                   <div>
                        <h3 class="font-bold text-gray-800 leading-tight">Mine Geology-II</h3>
                        <p class="text-[10px] text-gray-400 font-bold uppercase tracking-wider">Semester 6 • 2024</p>
                    </div>
                </div>
                <a href="papers/geology-2024.pdf" class="bg-orange-500 text-white p-3 rounded-xl shadow-md active:scale-90 transition">
                    <i class="fa-solid fa-download"></i>
                </a>
            </div>

            <div class="paper-card bg-white p-4 rounded-2xl flex justify-between items-center shadow-sm border border-gray-100">
                <div class="flex items-center">
                    <div class="bg-green-50 p-3 rounded-xl mr-4">
                        <i class="fa-solid fa-file-pdf text-green-500 text-xl"></i>
                    </div>
                   <div>
                        <h3 class="font-bold text-gray-800 leading-tight">Eng. Graphics</h3>
                        <p class="text-[10px] text-gray-400 font-bold uppercase tracking-wider">Semester 2 • 2023</p>
                    </div>
                </div>
                <a href="#" class="bg-orange-500 text-white p-3 rounded-xl shadow-md active:scale-90 transition">
                    <i class="fa-solid fa-download"></i>
                </a>
            </div>
        </div>
    </main>

    <footer class="text-center p-6 text-gray-400 text-xs">
        <p>© 2026 SPM Tutorial Portal</p>
    </div>

    <script>
        function searchPapers() {
            let input = document.getElementById('searchInput').value.toLowerCase();
            let cards = document.getElementsByClassName('paper-card');
            for (let i = 0; i < cards.length; i++) {
                let content = cards[i].innerText.toLowerCase();
                cards[i].style.display = content.includes(input) ? "flex" : "none";
            }
        }
    </script>
</body>
</html>
